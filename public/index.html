<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARTA 实时公交追踪</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="3" y="8" width="22" height="14" rx="3" fill="#0057A8"/>
          <rect x="5" y="5" width="18" height="5" rx="1.5" fill="#0070D8"/>
          <circle cx="8.5" cy="23" r="2.5" fill="#1a1a2e"/>
          <circle cx="19.5" cy="23" r="2.5" fill="#1a1a2e"/>
          <rect x="10" y="11" width="8" height="5" rx="1" fill="white" opacity="0.9"/>
        </svg>
        <span>MARTA<em>live</em></span>
      </div>
      <div id="live-indicator" class="indicator offline">
        <span class="dot"></span> OFFLINE
      </div>
    </div>

    <div class="filters">
      <div class="filter-row">
        <select id="route-filter">
          <option value="">全部线路</option>
        </select>
        <select id="status-filter">
          <option value="">全部状态</option>
          <option value="IN_TRANSIT_TO">行驶中</option>
          <option value="STOPPED_AT">停靠中</option>
        </select>
      </div>
      <input type="search" id="search" placeholder="搜索线路 / 车辆ID…">
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span id="stat-total">—</span>
        <label>总车辆</label>
      </div>
      <div class="stat">
        <span id="stat-moving">—</span>
        <label>行驶中</label>
      </div>
      <div class="stat">
        <span id="stat-stopped">—</span>
        <label>停靠中</label>
      </div>
      <div class="stat">
        <span id="stat-routes">—</span>
        <label>线路数</label>
      </div>
    </div>

    <div class="vehicle-list-header">
      <span id="list-count">0 辆车</span>
      <button id="refresh-btn" onclick="manualRefresh()">↻ 刷新</button>
    </div>

    <div id="vehicle-list"></div>

    <div class="sidebar-footer">
      <span id="last-update">—</span>
      <span>· 15秒自动刷新</span>
    </div>
  </aside>

  <!-- Map -->
  <main id="map-container">
    <div id="map"></div>

    <!-- Vehicle detail popup -->
    <div id="detail-card" class="detail-card hidden">
      <button class="detail-close" onclick="closeDetail()">×</button>
      <div class="detail-route" id="detail-route">线路 —</div>
      <div class="detail-id" id="detail-id">—</div>
      <div class="detail-grid" id="detail-grid"></div>
      <div class="detail-stops" id="detail-stops"></div>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="loading-overlay">
      <div class="loading-inner">
        <div class="loading-spinner"></div>
        <p>连接 MARTA 实时数据…</p>
      </div>
    </div>

    <!-- Error toast -->
    <div id="error-toast" class="error-toast hidden"></div>

    <!-- Zoom controls -->
    <div class="map-controls">
      <button onclick="map.zoomIn()">+</button>
      <button onclick="map.zoomOut()">−</button>
    </div>

    <!-- Mobile toggle -->
    <button id="sidebar-toggle" onclick="toggleSidebar()">☰</button>
  </main>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
